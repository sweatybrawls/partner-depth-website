<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — PartnerDepth</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .err { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: var(--s-12) var(--container-pad); text-align: center; }
    .err__code { font-family: var(--font-mono); color: var(--pd-purple); font-size: var(--fs-14); letter-spacing: var(--ls-wide); margin-bottom: var(--s-4); }
    .err__title { color: var(--pd-navy); font-size: clamp(40px, 5vw, 56px); font-weight: var(--fw-bold); letter-spacing: var(--ls-tight); line-height: 1.05; margin: 0 0 var(--s-4); max-width: 640px; }
    .err__lead { color: var(--fg-2); font-size: var(--fs-18); line-height: 1.55; max-width: 480px; margin: 0 0 var(--s-6); }
  </style>
</head>
<body>
  <main class="err">
    <p class="err__code">ERROR · 404</p>
    <h1 class="err__title">That page isn't here.</h1>
    <p class="err__lead">Probably moved, probably gone. Either way, the home page is a click away.</p>
    <a class="btn btn--primary btn--lg" href="/">Back to home</a>
  </main>
</body>
</html>
