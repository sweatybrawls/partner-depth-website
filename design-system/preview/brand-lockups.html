<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#F9F8FA;font-family:var(--font-sans);}
body{padding:24px;display:flex;gap:18px;align-items:center;justify-content:center;}
.lockup{display:flex;flex-direction:column;align-items:center;gap:10px;}
.lockup img{max-height:140px;max-width:100%;}
.label{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#7A7889;}
.box{padding:20px;background:#fff;border-radius:12px;border:1px solid #E5E4E9;display:flex;align-items:center;justify-content:center;min-height:160px;min-width:160px;}
</style></head><body>
<div class="lockup"><div class="box"><img src="../assets/pd_primary_mark.png" alt="Primary mark"/></div><div class="label">Primary mark</div></div>
<div class="lockup"><div class="box" style="min-width:240px;"><img src="../assets/partnerdepth_horizontal.png" alt="Horizontal"/></div><div class="label">Horizontal lockup</div></div>
<div class="lockup"><div class="box" style="min-width:200px;"><img src="../assets/partnerdepth_vertical.png" alt="Vertical"/></div><div class="label">Vertical lockup</div></div>
</body></html>
