<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  body{padding:24px;}
  .row{display:flex;gap:14px;align-items:stretch;}
  .sw{flex:1;border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:130px;border:1px solid var(--border-1);}
  .sw .name{font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
  .sw .hex{font-family:var(--font-mono);font-size:12px;opacity:.85;}
  .sw .label{font-size:11px;opacity:.7;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:auto;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#26215C;color:#fff;">
    <div class="label">Primary</div>
    <div><div class="name">Navy</div><div class="hex">#26215C</div></div>
  </div>
  <div class="sw" style="background:#534AB7;color:#fff;">
    <div class="label">Accent</div>
    <div><div class="name">Purple</div><div class="hex">#534AB7</div></div>
  </div>
  <div class="sw" style="background:#AFA9EC;color:#26215C;">
    <div class="label">Light</div>
    <div><div class="name">Lavender</div><div class="hex">#AFA9EC</div></div>
  </div>
</div>
</body></html>
