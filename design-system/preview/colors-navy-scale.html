<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:20px;}
.scale{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border-1);}
.cell{padding:10px 6px;font-family:var(--font-mono);font-size:10px;text-align:center;display:flex;flex-direction:column;gap:4px;height:96px;justify-content:flex-end;}
.cell .n{font-weight:600;font-size:11px;font-family:var(--font-sans);letter-spacing:0.04em;}
.label{font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--pd-purple);margin:0 0 10px;}
</style></head><body>
<div class="label">Navy scale</div>
<div class="scale">
  <div class="cell" style="background:#15123A;color:#fff;"><div class="n">950</div><div>15123A</div></div>
  <div class="cell" style="background:#1B1747;color:#fff;"><div class="n">900</div><div>1B1747</div></div>
  <div class="cell" style="background:#26215C;color:#fff;"><div class="n">800</div><div>26215C</div></div>
  <div class="cell" style="background:#322C75;color:#fff;"><div class="n">700</div><div>322C75</div></div>
  <div class="cell" style="background:#3F3890;color:#fff;"><div class="n">600</div><div>3F3890</div></div>
  <div class="cell" style="background:#534AB7;color:#fff;"><div class="n">500</div><div>534AB7</div></div>
  <div class="cell" style="background:#7A72CC;color:#fff;"><div class="n">400</div><div>7A72CC</div></div>
  <div class="cell" style="background:#AFA9EC;color:#26215C;"><div class="n">300</div><div>AFA9EC</div></div>
  <div class="cell" style="background:#CFCBF3;color:#26215C;"><div class="n">200</div><div>CFCBF3</div></div>
  <div class="cell" style="background:#E5E3F8;color:#26215C;"><div class="n">100</div><div>E5E3F8</div></div>
  <div class="cell" style="background:#F4F3FC;color:#26215C;"><div class="n">50</div><div>F4F3FC</div></div>
</div>
</body></html>
