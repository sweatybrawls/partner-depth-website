<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:20px;}
.scale{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--border-1);}
.cell{padding:10px 6px;font-family:var(--font-mono);font-size:10px;text-align:center;display:flex;flex-direction:column;gap:4px;height:96px;justify-content:flex-end;}
.cell .n{font-weight:600;font-size:11px;font-family:var(--font-sans);letter-spacing:0.04em;}
.label{font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--pd-purple);margin:0 0 10px;}
</style></head><body>
<div class="label">Ink (neutral) scale</div>
<div class="scale">
  <div class="cell" style="background:#0E0D1A;color:#fff;"><div class="n">950</div><div>0E0D1A</div></div>
  <div class="cell" style="background:#1A1827;color:#fff;"><div class="n">900</div><div>1A1827</div></div>
  <div class="cell" style="background:#2A2837;color:#fff;"><div class="n">800</div><div>2A2837</div></div>
  <div class="cell" style="background:#3F3D4F;color:#fff;"><div class="n">700</div><div>3F3D4F</div></div>
  <div class="cell" style="background:#5C5A6E;color:#fff;"><div class="n">600</div><div>5C5A6E</div></div>
  <div class="cell" style="background:#7A7889;color:#fff;"><div class="n">500</div><div>7A7889</div></div>
  <div class="cell" style="background:#9C9AA9;color:#fff;"><div class="n">400</div><div>9C9AA9</div></div>
  <div class="cell" style="background:#C7C5CF;color:#1A1827;"><div class="n">300</div><div>C7C5CF</div></div>
  <div class="cell" style="background:#E5E4E9;color:#1A1827;"><div class="n">200</div><div>E5E4E9</div></div>
  <div class="cell" style="background:#F2F1F4;color:#1A1827;"><div class="n">100</div><div>F2F1F4</div></div>
  <div class="cell" style="background:#F9F8FA;color:#1A1827;border-right:1px solid #E5E4E9;"><div class="n">50</div><div>F9F8FA</div></div>
</div>
</body></html>
