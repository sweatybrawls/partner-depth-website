<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:24px;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:inherit;font-size:15px;font-weight:500;border-radius:8px;padding:10px 18px;cursor:pointer;border:1px solid transparent;transition:all 200ms cubic-bezier(0.2,0.7,0.2,1);}
.btn-primary{background:#26215C;color:#fff;}
.btn-primary:hover{background:#1B1747;}
.btn-secondary{background:#fff;color:#26215C;border-color:#E5E4E9;}
.btn-secondary:hover{background:#F4F3FC;border-color:#534AB7;}
.btn-ghost{background:transparent;color:#534AB7;}
.btn-ghost:hover{background:#F4F3FC;}
.btn-sm{font-size:13px;padding:6px 12px;}
.btn-lg{font-size:16px;padding:14px 24px;}
.label{font-size:11px;font-weight:600;color:var(--fg-3);letter-spacing:0.12em;text-transform:uppercase;margin:0 0 10px;}
.group{margin-bottom:14px;}
</style></head><body>
<div class="group">
<div class="label">Variants</div>
<div class="row">
  <button class="btn btn-primary">Book a strategy call</button>
  <button class="btn btn-secondary">View case study</button>
  <button class="btn btn-ghost">Learn more →</button>
</div>
</div>
<div class="group">
<div class="label">Sizes</div>
<div class="row">
  <button class="btn btn-primary btn-sm">Small</button>
  <button class="btn btn-primary">Medium</button>
  <button class="btn btn-primary btn-lg">Large</button>
</div>
</div>
</body></html>
