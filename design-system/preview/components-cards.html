<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#F9F8FA;font-family:var(--font-sans);}
body{padding:24px;display:flex;gap:18px;}
.card{flex:1;background:#fff;border:1px solid #E5E4E9;border-radius:14px;padding:22px;transition:box-shadow 200ms;}
.card:hover{box-shadow:0 2px 6px rgba(38,33,92,0.06),0 1px 2px rgba(38,33,92,0.04);}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#534AB7;margin-bottom:10px;}
.title{font-size:18px;font-weight:600;color:#26215C;margin:0 0 8px;}
.body{font-size:14px;line-height:1.5;color:#3F3D4F;margin:0;}
.dark{background:#26215C;color:#fff;border:none;}
.dark .eyebrow{color:#AFA9EC;}
.dark .title{color:#fff;}
.dark .body{color:#CFCBF3;}
.metric{font-size:42px;font-weight:700;letter-spacing:-0.02em;color:#fff;margin:8px 0 4px;font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="card">
  <div class="eyebrow">Audit</div>
  <h3 class="title">Program health scorecard</h3>
  <p class="body">A 12-point diagnostic across recruiting, attribution, commission structure, and partner mix. Delivered in 14 days.</p>
</div>
<div class="card dark">
  <div class="eyebrow">Result</div>
  <div class="metric">+42%</div>
  <p class="body">Incremental revenue lift, mid-market hosting client, six-month engagement.</p>
</div>
</body></html>
