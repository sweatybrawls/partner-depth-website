<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:0;}
.nav{display:flex;align-items:center;padding:14px 28px;border-bottom:1px solid #E5E4E9;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);gap:64px;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand img{height:30px;}
.links{display:flex;gap:32px;margin-right:auto;}
.links a{font-size:14px;font-weight:500;color:#3F3D4F;text-decoration:none;}
.links a:hover{color:#26215C;}
.links a.active{color:#26215C;font-weight:600;}
.cta{display:flex;gap:10px;align-items:center;}
.btn{font-family:inherit;font-size:14px;font-weight:500;border-radius:8px;padding:8px 16px;border:1px solid transparent;cursor:pointer;}
.btn-primary{background:#26215C;color:#fff;}
.btn-ghost{background:transparent;color:#26215C;}
</style></head><body>
<nav class="nav">
  <div class="brand">
    <img src="../assets/partnerdepth_horizontal.png" alt="PartnerDepth" />
  </div>
  <div class="links">
    <a class="active">Services</a>
    <a>Approach</a>
    <a>Case studies</a>
    <a>Insights</a>
    <a>About</a>
  </div>
  <div class="cta">
    <button class="btn btn-ghost">Sign in</button>
    <button class="btn btn-primary">Book a call</button>
  </div>
</nav>
</body></html>
