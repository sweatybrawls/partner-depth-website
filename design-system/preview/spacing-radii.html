<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:20px;}
.row{display:flex;gap:18px;align-items:center;}
.box{background:var(--pd-navy);width:80px;height:80px;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:11px;padding-bottom:6px;}
.col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.label{font-size:11px;font-weight:600;color:var(--fg-3);letter-spacing:0.06em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:4px;">4</div><div class="label">r-sm</div></div>
  <div class="col"><div class="box" style="border-radius:8px;">8</div><div class="label">r-md</div></div>
  <div class="col"><div class="box" style="border-radius:12px;">12</div><div class="label">r-lg</div></div>
  <div class="col"><div class="box" style="border-radius:16px;">16</div><div class="label">r-xl</div></div>
  <div class="col"><div class="box" style="border-radius:20px;">20</div><div class="label">r-2xl</div></div>
  <div class="col"><div class="box" style="border-radius:999px;">pill</div><div class="label">r-pill</div></div>
</div>
</body></html>
