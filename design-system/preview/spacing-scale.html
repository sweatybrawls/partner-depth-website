<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
body{padding:20px;}
.row{display:flex;align-items:flex-end;gap:14px;height:140px;}
.col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{background:var(--pd-purple);border-radius:4px;width:48px;}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.size{font-size:11px;font-weight:600;color:var(--pd-navy);}
</style></head><body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px;"></div><div class="size">4</div><div class="label">s-1</div></div>
  <div class="col"><div class="bar" style="height:8px;"></div><div class="size">8</div><div class="label">s-2</div></div>
  <div class="col"><div class="bar" style="height:12px;"></div><div class="size">12</div><div class="label">s-3</div></div>
  <div class="col"><div class="bar" style="height:16px;"></div><div class="size">16</div><div class="label">s-4</div></div>
  <div class="col"><div class="bar" style="height:24px;"></div><div class="size">24</div><div class="label">s-6</div></div>
  <div class="col"><div class="bar" style="height:32px;"></div><div class="size">32</div><div class="label">s-8</div></div>
  <div class="col"><div class="bar" style="height:48px;"></div><div class="size">48</div><div class="label">s-12</div></div>
  <div class="col"><div class="bar" style="height:64px;"></div><div class="size">64</div><div class="label">s-16</div></div>
  <div class="col"><div class="bar" style="height:96px;"></div><div class="size">96</div><div class="label">s-24</div></div>
  <div class="col"><div class="bar" style="height:128px;"></div><div class="size">128</div><div class="label">s-32</div></div>
</div>
</body></html>
