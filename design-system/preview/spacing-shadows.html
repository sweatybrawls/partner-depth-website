<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#F9F8FA;font-family:var(--font-sans);}
body{padding:30px;}
.row{display:flex;gap:24px;}
.card{background:#fff;width:160px;height:90px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--pd-navy);font-family:var(--font-mono);}
.xs{box-shadow:0 1px 2px rgba(38,33,92,0.06);}
.sm{box-shadow:0 2px 6px rgba(38,33,92,0.06),0 1px 2px rgba(38,33,92,0.04);}
.md{box-shadow:0 6px 16px rgba(38,33,92,0.08),0 2px 4px rgba(38,33,92,0.04);}
.lg{box-shadow:0 18px 40px rgba(38,33,92,0.12),0 4px 8px rgba(38,33,92,0.06);}
.label{font-size:11px;font-weight:600;color:var(--fg-3);letter-spacing:0.06em;text-transform:uppercase;margin-top:8px;text-align:center;}
.col{display:flex;flex-direction:column;}
</style></head><body>
<div class="row">
  <div class="col"><div class="card xs">xs</div><div class="label">shadow-xs</div></div>
  <div class="col"><div class="card sm">sm</div><div class="label">shadow-sm</div></div>
  <div class="col"><div class="card md">md</div><div class="label">shadow-md</div></div>
  <div class="col"><div class="card lg">lg</div><div class="label">shadow-lg</div></div>
</div>
</body></html>
