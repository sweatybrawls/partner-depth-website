<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartnerDepth — Affiliate & partner marketing consulting</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    body { font-family: var(--font-sans); color: var(--fg-1); }
    * { box-sizing: border-box; }

    /* Button system shared with the kit */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: inherit; font-weight: 500; border-radius: 8px;
      padding: 10px 18px; font-size: 15px; cursor: pointer;
      border: 1px solid transparent;
      transition: all var(--dur-base) var(--ease-out);
    }
    .btn-primary { background: var(--pd-navy); color: #fff; }
    .btn-primary:hover { background: var(--navy-900); }
    .btn-primary:active { background: var(--navy-950); }
    .btn-secondary { background: #fff; color: var(--pd-navy); border-color: var(--border-1); }
    .btn-secondary:hover { background: var(--bg-tint); border-color: var(--pd-purple); }
    .btn-ghost { background: transparent; color: var(--pd-purple); }
    .btn-ghost:hover { background: var(--bg-tint); }
    .btn-lg { padding: 14px 24px; font-size: 16px; }

    .input {
      font-family: inherit; font-size: 15px;
      padding: 10px 14px; border: 1px solid var(--border-1);
      border-radius: 8px; background: #fff; color: var(--fg-1);
      outline: none; transition: all 200ms;
    }
    .input:focus { border-color: var(--pd-purple); box-shadow: var(--shadow-focus); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Process.jsx"></script>
  <script type="text/babel" src="Metrics.jsx"></script>
  <script type="text/babel" src="CaseStudy.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="BookCallModal.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [bookOpen, setBookOpen] = useState(false);
      return (
        <>
          <Nav onBook={() => setBookOpen(true)} />
          <Hero onBook={() => setBookOpen(true)} />
          <Services />
          <Process />
          <Metrics />
          <CaseStudy />
          <section style={{ padding: '80px 48px', textAlign: 'center' }}>
            <h2 className="t-h1" style={{ margin: '0 0 16px', maxWidth: 720, marginInline: 'auto' }}>
              Ready to look at the data?
            </h2>
            <p className="t-lead" style={{ margin: '0 auto 28px', maxWidth: 540 }}>
              Thirty minutes. No deck, no pitch. We'll talk through what's working in your program and what isn't.
            </p>
            <button className="btn btn-primary btn-lg" onClick={() => setBookOpen(true)}>Book a strategy call</button>
          </section>
          <Footer />
          <BookCallModal open={bookOpen} onClose={() => setBookOpen(false)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
